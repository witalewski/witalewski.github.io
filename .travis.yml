language: node_js
node_js:
  - 'node'

jobs:
  include:
    - script: yarn test
    - script: yarn start & wait-on http://localhost:8080
    - script: yarn cypress run
    - stage: build
    - script: yarn build
    - stage: deploy
      script: skip
      provider: pages
        target_branch: master
        local_dir: public
        skip_cleanup: true
        github_token: $DEPLOY_TOKEN
        keep_history: true
        on:
          branch: dev
